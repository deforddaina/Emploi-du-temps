!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlanning - Générateur d'Emploi du Temps</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- BARRE DE NAVIGATION -->
<nav class="navbar">
    <div class="nav-brand">🎓 SmartPlanning</div>
    <div class="nav-links">
        <a href="/" class="nav-link active">🏠 Accueil</a>
        <a href="/analyse" class="nav-link">📊 Analyse</a>
    </div>
</nav>

<div class="hero">
    <div class="hero-content">
        <div class="logo">🎓</div>
        <h1>SmartPlanning</h1>
        <p>Génère ton emploi du temps optimal en quelques secondes</p>
    </div>
</div>

<div class="container">

    <div class="card">
        <div class="card-header">
            <span class="card-icon">👤</span>
            <h2>Informations personnelles</h2>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Nom complet <span style="color:red">*</span></label>
                <input type="text" id="nom" placeholder="Ex: Marie Dupont">
            </div>
        </div>
        <div class="form-row two-cols">
            <div class="form-group">
                <label>🌅 Heure de réveil <span style="color:red">*</span></label>
                <input type="time" id="heure_reveil" value="06:00">
            </div>
            <div class="form-group">
                <label>🌙 Heure de coucher <span style="color:red">*</span></label>
                <input type="time" id="heure_coucher" value="22:00">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <span class="card-icon">📚</span>
            <h2>Mes cours de la semaine</h2>
        </div>
        <p class="card-desc">
            Ajoutez tous vos cours avec leurs horaires
            <span style="color:red">*</span>
        </p>
        <div id="liste_cours"></div>
        <button class="btn-ajouter" onclick="ajouterCours()">
            ➕ Ajouter un cours
        </button>
    </div>

    <button class="btn-generer" onclick="genererPlanning()">
        🚀 Générer mon emploi du temps
    </button>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
